{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-ingest
  labels:
    {{- include "cardano-mcp.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: ingest
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["node", "dist/ingest/cli.js"]
              env:
                - name: EMBEDDINGS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "cardano-mcp.secretName" . }}
                      key: embeddings-api-key
              volumeMounts:
                - name: data
                  mountPath: /app/data
                - name: repos
                  mountPath: /app/repos
              resources:
                {{- toYaml .Values.cronjob.resources | nindent 16 }}
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-data
            - name: repos
              emptyDir:
                sizeLimit: {{ .Values.repos.sizeLimit }}
{{- end }}
