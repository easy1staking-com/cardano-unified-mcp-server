apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "cardano-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cardano-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cardano-mcp.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: cardano-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: EMBEDDINGS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cardano-mcp.secretName" . }}
                  key: embeddings-api-key
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "cardano-mcp.secretName" . }}
                  key: mcp-api-key
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: repos
              mountPath: /app/repos
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        - name: repos
          emptyDir:
            sizeLimit: {{ .Values.repos.sizeLimit }}
