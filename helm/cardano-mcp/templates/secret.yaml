{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "cardano-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  embeddings-api-key: {{ .Values.secrets.embeddingsApiKey | b64enc | quote }}
  mcp-api-key: {{ .Values.secrets.mcpApiKey | b64enc | quote }}
{{- end }}
