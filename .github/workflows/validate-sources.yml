name: Validate Sources

on:
  push:
    branches: [main]
    paths:
      - 'config/sources.yaml'
      - 'src/config/sources.ts'
      - 'scripts/validate-sources.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate-sources.yml'
  pull_request:
    branches: [main]
    paths:
      - 'config/sources.yaml'
      - 'src/config/sources.ts'
      - 'scripts/validate-sources.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate-sources.yml'

jobs:
  validate:
    name: Validate config/sources.yaml
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate config/sources.yaml
        run: npm run validate:sources

      - name: Typecheck
        run: npm run typecheck
